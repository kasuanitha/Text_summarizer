<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <rect width="100%" height="100%" fill="#f7f9fb"/>
  <rect x="20" y="20" width="760" height="180" rx="8" fill="#ffffff" stroke="#e1e8f0"/>
  <text x="40" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#0b3d91">Sample Output — Text Summarizer</text>
  <text x="40" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#222">Summary:</text>
  <text x="40" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#333">• This is an example summary showing the top-ranked sentences from the input text.</text>
  <text x="40" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#333">• The summarizer selects the most relevant sentences using TF‑IDF and cosine similarity.</text>
  <text x="40" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#333">• Results include a simple accuracy score indicating similarity to the original text.</text>
  <g transform="translate(560,80)">
    <rect x="0" y="0" width="180" height="80" rx="6" fill="#f0f7ff" stroke="#cfe0ff"/>
    <text x="12" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0b3d91">Accuracy</text>
    <text x="12" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0b3d91">92%</text>
  </g>
</svg>
